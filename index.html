<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bug Report Enhancer</title>
  <meta name="description" content="Drag and drop screenshots to analyze bugs and push to Jira automatically" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">
        <span class="title-icon">🐛</span>
        Bug Report Enhancer
      </h1>
      <button id="settings-btn" class="btn btn-settings" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        SETTINGS
      </button>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Drop Zone -->
      <div id="drop-zone" class="drop-zone">
        <div id="drop-zone-placeholder" class="drop-zone__placeholder">
          <div class="drop-zone__icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
          </div>
          <p class="drop-zone__text">Drag &amp; Drop Screenshot Here</p>
          <p class="drop-zone__subtext">or click to browse files</p>
          <p class="drop-zone__formats">Supports PNG, JPG, WEBP • Max 20MB</p>
        </div>
        <div id="drop-zone-preview" class="drop-zone__preview" style="display:none;">
          <img id="preview-image" class="drop-zone__preview-img" alt="Screenshot preview" />
          <button id="remove-image" class="btn-remove" type="button" title="Remove image">✕</button>
        </div>
        <input type="file" id="file-input" accept="image/*" hidden />
      </div>

      <!-- Additional Notes -->
      <div class="notes-wrapper">
        <label for="additional-notes" class="notes-label">Additional Notes</label>
        <textarea
          id="additional-notes"
          class="notes-textarea"
          placeholder="Describe the bug, steps to reproduce, or any additional context..."
          rows="3"
        ></textarea>
      </div>

      <!-- Action Button -->
      <button id="analyze-btn" class="btn btn-analyze" type="button" disabled>
        <span id="analyze-btn-text">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
          Analyze and Push to Jira
        </span>
        <span id="analyze-btn-loading" class="btn-loading" style="display:none;">
          <span class="spinner"></span>
          Analyzing...
        </span>
      </button>

      <!-- Status Messages -->
      <div id="status-area" class="status-area" style="display:none;"></div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          Settings
        </h2>
        <button id="modal-close" class="btn-modal-close" type="button">✕</button>
      </div>

      <div class="modal-body">
        <!-- Jira Section -->
        <fieldset class="settings-section">
          <legend class="section-legend">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
              <path d="M2 17l10 5 10-5"></path>
              <path d="M2 12l10 5 10-5"></path>
            </svg>
            Jira Connection Details
          </legend>

          <div class="form-group">
            <label for="jira-url">Jira URL</label>
            <input type="url" id="jira-url" placeholder="https://yourcompany.atlassian.net" />
          </div>
          <div class="form-group">
            <label for="jira-email">Email</label>
            <input type="email" id="jira-email" placeholder="your.email@company.com" />
          </div>
          <div class="form-group">
            <label for="jira-api-token">API Token</label>
            <input type="password" id="jira-api-token" placeholder="Your Jira API token" />
          </div>
          <div class="form-group">
            <label for="jira-project">Project</label>
            <div class="project-picker-row">
              <select id="jira-project" class="project-select">
                <option value="">-- Click "Load Projects" to fetch --</option>
              </select>
              <button id="load-projects-btn" class="btn btn-load" type="button">Load Projects</button>
            </div>
            <span class="form-hint" id="project-hint">Save your Jira credentials first, then click Load Projects</span>
          </div>
          <div class="form-group">
            <label for="jira-issue-type">Issue Type</label>
            <input type="text" id="jira-issue-type" placeholder="Bug" value="Bug" />
          </div>

          <button id="test-jira-btn" class="btn btn-test" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
            Test Jira Connection
          </button>
          <div id="jira-test-result" class="test-result"></div>
        </fieldset>

        <!-- Groq Section -->
        <fieldset class="settings-section">
          <legend class="section-legend">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            </svg>
            Groq API Configuration
          </legend>

          <div class="form-group">
            <label for="groq-api-key">Groq API Key</label>
            <input type="password" id="groq-api-key" placeholder="gsk_..." />
            <span class="form-hint">Uses Llama 4 Scout (free tier) for screenshot analysis</span>
          </div>

          <button id="test-groq-btn" class="btn btn-test" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
            Test Groq Connection
          </button>
          <div id="groq-test-result" class="test-result"></div>
        </fieldset>
      </div>

      <div class="modal-footer">
        <button id="save-settings-btn" class="btn btn-save" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
          Save Settings
        </button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
